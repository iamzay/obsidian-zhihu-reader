name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Verify release version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: >-
          node -e "const manifest = require('./manifest.json');
          const pkg = require('./package.json');
          const versions = require('./versions.json');
          if (manifest.version !== process.env.RELEASE_TAG ||
          pkg.version !== process.env.RELEASE_TAG ||
          versions[manifest.version] !== manifest.minAppVersion)
          process.exit(1)"

      - run: npm ci
      - run: npm run check

      - name: Attest release assets
        uses: actions/attest@v4
        with:
          subject-path: |
            ${{ github.workspace }}/main.js
            ${{ github.workspace }}/styles.css
            ${{ github.workspace }}/manifest.json

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME"
          main.js manifest.json styles.css
          --title "$GITHUB_REF_NAME"
          --generate-notes
